<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Course Discussion &amp; Resource Hub</title>
    <!--
      Blocking script: runs synchronously before first paint so the correct
      dark-mode class and colour theme are set on <html> before React renders.
      This prevents the flash of wrong theme/light-mode on page load.
    -->
    <script>document.documentElement.classList.add('dark');</script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
